name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      COMPOSER_MAX_PARALLEL_HTTP: 1
    strategy:
      matrix:
        php-version: [ '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          extensions: dom, mbstring, openssl, xml
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Drupal test project
        run: composer create-project drupal/recommended-project:^11.3 ci-drupal --no-interaction --no-progress
      - name: Install module into test project
        working-directory: ci-drupal
        run: |
          composer config repositories.local-module path ..
          composer config 'extra.installer-paths.web/modules/custom/{$name}' '["type:drupal-custom-module"]'
          composer require --dev phpunit/phpunit:^10.5 --with-all-dependencies --no-interaction --no-progress
          composer require drupal/taler_payments:*@dev --no-interaction --no-progress
      - name: Run module unit tests
        working-directory: ci-drupal
        run: ./vendor/bin/phpunit web/modules/custom/taler_payments/tests/src/Unit --testdox
