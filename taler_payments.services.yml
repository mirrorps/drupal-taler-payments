services:
  taler_payments.amount_input_validator:
    class: Drupal\taler_payments\Validation\TalerAmountInputValidator
    arguments: ['@string_translation']
  taler_payments.payment_button_builder:
    class: Drupal\taler_payments\TalerPaymentButtonBuilder
  taler_payments.credential_encryptor:
    class: Drupal\taler_payments\Security\TalerCredentialEncryptor
  taler_payments.client_manager:
    class: Drupal\taler_payments\Service\TalerClientManager
    arguments:
      - '@config.factory'
      - '@taler_payments.credential_encryptor'
  taler_payments.checkout_intent_store:
    class: Drupal\taler_payments\Checkout\CheckoutIntentStore
    arguments:
      - '@request_stack'
  taler_payments.checkout_manager:
    class: Drupal\taler_payments\Checkout\TalerCheckoutManager
    arguments:
      - '@taler_payments.client_manager'
      - '@taler_payments.checkout_intent_store'
      - '@taler_payments.public_text_provider'
      - '@uuid'
  taler_payments.public_text_provider:
    class: Drupal\taler_payments\PublicText\TalerPublicTextProvider
    arguments:
      - '@config.factory'
