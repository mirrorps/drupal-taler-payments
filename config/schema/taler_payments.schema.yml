block.settings.taler_payment_button:
  type: block_settings
  label: 'Taler payment button block'
  mapping:
    button_text:
      type: string
      label: 'Button text'
    summary:
      type: string
      label: 'Summary'
    amount:
      type: string
      label: 'Amount'

taler_payments.settings:
  type: config_object
  label: 'Taler Payments settings'
  mapping:
    taler_base_url:
      type: uri
      label: 'Taler Base URL'
    instance_id:
      type: string
      label: 'Instance ID'
    username:
      type: string
      label: 'Username'
    password:
      type: string
      label: 'Encrypted Password'
    access_token:
      type: string
      label: 'Encrypted Access Token'
    public_call_to_action:
      type: string
      label: 'Checkout call-to-action'
    public_thank_you_message:
      type: string
      label: 'Checkout thank-you message'
    public_payment_button_cta:
      type: string
      label: 'Checkout payment button CTA'
